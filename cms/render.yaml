services:
  - type: web
    name: 6454565-cms
    runtime: python
    rootDir: cms
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py seed &&
      python manage.py ensure_admin
    startCommand: gunicorn publisher.wsgi --bind 0.0.0.0:$PORT --log-file -
    healthCheckPath: /admin/login/
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,.6454565.xyz,localhost,127.0.0.1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://*.6454565.xyz,https://6454565.xyz"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@6454565.xyz
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: 6454565-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: 6454565-db
    plan: free
    databaseName: publisher
    user: publisher
